name: Manga Publishing Bot

on:
  schedule:
    # প্রতি ৬ ঘণ্টা পর পর বটটি চলবে
    - cron: '0 */6 * * *'
  
  # GitHub-এর Actions ট্যাব থেকে ম্যানুয়ালি বট চালানোর জন্য
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # --- নতুন এবং গুরুত্বপূর্ণ পরিবর্তন ---
    # এই অংশটি বটকে posted_chapters.json ফাইলটি পুশ করার অনুমতি দেয়
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot script
        env:
          # --- অপ্রয়োজনীয় কী সরানো হয়েছে ---
          # এখন শুধু Google-এর Secret গুলোই প্রয়োজন
          BLOG_ID: ${{ secrets.BLOG_ID }}
          G_CLIENT_ID: ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET: ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN: ${{ secrets.G_REFRESH_TOKEN }}
        run: python bot.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add posted_chapters.json
          git diff --staged --quiet || git commit -m "Update posted chapters list"
          git push
